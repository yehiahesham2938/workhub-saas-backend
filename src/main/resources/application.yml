server:
  port: 8080

spring:
  application:
    name: workhub-saas-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workhub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari: 
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: info

jwt:
  # Base64-encoded 32+ byte key for HS256 signatures.
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
