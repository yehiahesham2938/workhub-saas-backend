server:
  port: 8080

spring:
  application:
    name: workhub-saas-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workhub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari: 
      initialization-fail-timeout: -1
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: info

jwt:
  secret: ${JWT_SECRET:VGhpcy1pcy1ub3QtMy1yZWFsbHktYS0yNTYtYml0LXNlY3JldC1zdHJpbmchISE=}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
